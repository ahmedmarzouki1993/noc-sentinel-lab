version: "3.8"

# ============================================================
# NOC Sentinel Lab — Full Stack
# All inter-service communication uses Docker service names.
# Never use localhost inside this file.
# ============================================================

networks:
  noc-net:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  zabbix-server-data:
  zabbix-agent-data:

services:

  # ──────────────────────────────────────────────
  # PostgreSQL — shared backend for app + Zabbix
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ZABBIX_DB_NAME: ${ZABBIX_DB_NAME}
      ZABBIX_DB_USER: ${ZABBIX_DB_USER}
      ZABBIX_DB_PASSWORD: ${ZABBIX_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/fastapi-app/init.sql:/docker-entrypoint-initdb.d/01-app.sql:ro
      - ./zabbix/init-zabbix-db.sh:/docker-entrypoint-initdb.d/02-zabbix.sh:ro
    networks:
      - noc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────
  # FastAPI app — HTTP monitoring target
  # ──────────────────────────────────────────────
  fastapi-app:
    build:
      context: ./services/fastapi-app
      dockerfile: Dockerfile
    container_name: fastapi-app
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - noc-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ──────────────────────────────────────────────
  # Zabbix Server
  # ──────────────────────────────────────────────
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:6.4-ubuntu-latest
    container_name: zabbix-server
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${ZABBIX_DB_NAME}
      POSTGRES_USER: ${ZABBIX_DB_USER}
      POSTGRES_PASSWORD: ${ZABBIX_DB_PASSWORD}
      ZBX_TIMEOUT: 10
      ZBX_STARTPINGERS: 1
    ports:
      - "10051:10051"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - zabbix-server-data:/var/lib/zabbix
    networks:
      - noc-net
    healthcheck:
      test: ["CMD-SHELL", "zabbix_server -R config_cache_reload 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ──────────────────────────────────────────────
  # Zabbix Web UI
  # ──────────────────────────────────────────────
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:6.4-ubuntu-latest
    container_name: zabbix-web
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${ZABBIX_DB_NAME}
      POSTGRES_USER: ${ZABBIX_DB_USER}
      POSTGRES_PASSWORD: ${ZABBIX_DB_PASSWORD}
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_NAME: ${ZBX_SERVER_NAME}
      PHP_TZ: UTC
    ports:
      - "8080:8080"
    depends_on:
      zabbix-server:
        condition: service_healthy
    networks:
      - noc-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ──────────────────────────────────────────────
  # Zabbix Agent 2
  # ──────────────────────────────────────────────
  zabbix-agent:
    image: zabbix/zabbix-agent2:6.4-ubuntu-latest
    container_name: zabbix-agent
    restart: unless-stopped
    privileged: true
    environment:
      ZBX_HOSTNAME: noc-sentinel-host
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      ZBX_ACTIVE_ALLOW: "true"
    ports:
      - "10050:10050"
    volumes:
      - zabbix-agent-data:/var/lib/zabbix
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - zabbix-server
    networks:
      - noc-net
    healthcheck:
      test: ["CMD-SHELL", "zabbix_agent2 -t agent.ping 2>/dev/null | grep -q '1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────
  # Node Exporter — host OS metrics
  # ──────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - noc-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────
  # Prometheus
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - fastapi-app
      - node-exporter
    networks:
      - noc-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────
  # AlertManager
  # ──────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: alertmanager
    restart: unless-stopped
    environment:
      ALERTMANAGER_SMTP_FROM: ${ALERTMANAGER_SMTP_FROM}
      ALERTMANAGER_SMTP_PASSWORD: ${ALERTMANAGER_SMTP_PASSWORD}
      ALERTMANAGER_RECEIVER_EMAIL: ${ALERTMANAGER_RECEIVER_EMAIL}
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - noc-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────
  # Grafana
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.0.3
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - alertmanager
    networks:
      - noc-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ──────────────────────────────────────────────
  # Webhook Bridge — Grafana alerts → Jira tickets
  # ──────────────────────────────────────────────
  webhook-bridge:
    build:
      context: ./services/webhook-bridge
      dockerfile: Dockerfile
    container_name: webhook-bridge
    restart: unless-stopped
    environment:
      JIRA_BASE_URL: ${JIRA_BASE_URL}
      JIRA_EMAIL: ${JIRA_EMAIL}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY}
    ports:
      - "8001:8001"
    networks:
      - noc-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
