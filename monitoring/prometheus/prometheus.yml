global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: fastapi-app
    static_configs:
      - targets:
          - fastapi-app:8000
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
    scrape_interval: 30s
